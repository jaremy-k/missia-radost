services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: missiya-radost-web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      MAX_BOT_TOKEN: ${MAX_BOT_TOKEN:-}
      MAX_CHAT_ID: ${MAX_CHAT_ID:-}
